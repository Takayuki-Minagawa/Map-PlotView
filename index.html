<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Map PlotView — 地図プロットツール</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <!-- Leaflet-Geoman -->
  <link rel="stylesheet" href="https://unpkg.com/@geoman-io/leaflet-geoman-free@2.18.3/dist/leaflet-geoman.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="mpv-header">
    <h1>🗺 Map PlotView</h1>
    <div class="mpv-io">
      <button id="btnLoad">📂 読込(YAML)</button>
      <button id="btnSaveYaml">💾 保存(YAML)</button>
      <button id="btnLoadSample">サンプル</button>
      <input type="file" id="fileInput" accept=".yaml,.yml,text/yaml" hidden>
    </div>
    <div id="status" class="mpv-status"></div>
  </header>

  <div class="mpv-layout">
    <!-- 左：サイドバー -->
    <aside class="mpv-sidebar">
      <section class="mpv-panel">
        <h2>背景 / オーバーレイ</h2>
        <div class="mpv-baselayers">
          <label><input type="radio" name="base" value="std"> 標準</label>
          <label><input type="radio" name="base" value="pale" checked> 淡色</label>
          <label><input type="radio" name="base" value="photo"> 写真</label>
          <label><input type="radio" name="base" value="osm"> OSM</label>
        </div>
        <div class="mpv-overlays">
          <label><input type="checkbox" data-overlay="afm"> 活断層図</label>
        </div>
      </section>

      <section class="mpv-panel">
        <div class="mpv-panel__head">
          <h2>タグ</h2>
          <button id="btnAddTag" class="mpv-mini">＋追加</button>
        </div>
        <div id="tagList" class="mpv-taglist"></div>
      </section>

      <section class="mpv-panel">
        <h2>作図</h2>
        <div class="mpv-drawtools">
          <button id="btnAddPoint">＋点</button>
          <button id="btnAddLine">／線</button>
          <button id="btnAddPolygon">▱面</button>
        </div>
      </section>

      <section class="mpv-panel">
        <div class="mpv-panel__head">
          <h2>範囲抽出</h2>
        </div>
        <div class="mpv-selecttools">
          <button id="btnRectSelect">■ 矩形選択</button>
          <button id="btnClearSelect" class="mpv-mini">クリア</button>
        </div>
        <div class="mpv-selectopts">
          <label>判定:
            <select id="selMode">
              <option value="intersect">交差</option>
              <option value="within">内包</option>
            </select>
          </label>
          <label><input type="checkbox" id="chkRespectHidden" checked> 非表示タグを除外</label>
        </div>
        <div class="mpv-panel__head">
          <h3>抽出結果 <span id="selectionCount"></span></h3>
        </div>
        <div id="selectionList" class="mpv-list"></div>
        <div class="mpv-export">
          <span>抽出を書出:</span>
          <button id="btnExportSelYaml" class="mpv-mini">YAML</button>
          <button id="btnExportSelGeo" class="mpv-mini">GeoJSON</button>
          <button id="btnExportSelCsv" class="mpv-mini">CSV</button>
        </div>
      </section>

      <section class="mpv-panel">
        <h2>プロット一覧</h2>
        <div id="featureList" class="mpv-list"></div>
      </section>

      <div id="warnings" class="mpv-warnings" style="display:none"></div>
    </aside>

    <!-- 中央：地図 -->
    <main class="mpv-mapwrap">
      <div id="map"></div>
    </main>

    <!-- 右：詳細ビューア -->
    <aside id="detail" class="mpv-detail"></aside>
  </div>

  <!-- ライブラリ（CDN） -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/@geoman-io/leaflet-geoman-free@2.18.3/dist/leaflet-geoman.min.js"></script>
  <script src="https://unpkg.com/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
  <script src="https://unpkg.com/@turf/turf@7.1.0/turf.min.js"></script>
  <script src="https://unpkg.com/exifr@7.1.3/dist/full.umd.js"></script>

  <!-- アプリ -->
  <script src="js/symbols.js"></script>
  <script src="js/store.js"></script>
  <script src="js/mapview.js"></script>
  <script src="js/select.js"></script>
  <script src="js/detail.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
